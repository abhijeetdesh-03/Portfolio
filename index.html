    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

<body>
    <section class="container-fluid hero-section d-flex flex-column justify-content-center align-items-center">
        <div class="row">
            <div class="col-md-12 col-sm-12 col-lg-12">
                <div class="avatar d-flex justify-content-center align-items-center">AD</div>

        </div>

            <div class="col-md-12 col-sm-12 col-lg-12">
                <h1 class="text-center"><strong>Abhijeet Deshmukh</strong></h1>
            </div>
        </div>
        <div class="row sub-heading">

                        <span class="slash">|</span>
                        <button class="btn-touch btn-primary">Get in Touch</button>
                    </div>
                </div>
            </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
